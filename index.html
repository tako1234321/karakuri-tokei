<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="からくりとけい" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <link rel="icon" href="./icons/icon-192.png" type="image/png" />
  <title>からくりとけい</title>
</head>
<body>
  <div id="titleScreen">
    <div class="titleInner">
      <canvas id="titleGear" width="160" height="160"></canvas>
      <h1>からくりとけい</h1>
      <p>はぐるまを くみあわせて<br>じぶんだけの からくりどけいを つくろう!</p>
      <button id="startBtn">はじめる</button>
    </div>
  </div>

  <div id="app" hidden>
    <div id="topbar"></div>
    <div id="main">
      <div id="palette"></div>
      <div id="inspector" hidden></div>
      <div id="stage">
        <canvas id="canvas"></canvas>
        <canvas id="overlay"></canvas>
        <div id="checkPanel" hidden></div>
        <div id="guidePanel" hidden></div>
        <div id="banner" hidden></div>
      </div>
    </div>
  </div>

  <div id="modalRoot" hidden></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
